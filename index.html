<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpsForge</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { margin:0; font-family:Arial; background:#111; color:#0f0; }
    header, footer { background:#001f00; color:#0f0; text-align:center; padding:10px; font-size:1.2em; font-weight:bold; }
    .disclaimer { background:#300; color:#ff0; padding:8px; font-size:0.9em; text-align:center; }
    button { background:#0f0; color:#000; padding:10px; margin:5px; border:none; cursor:pointer; }
    select { padding:10px; width:100%; margin:10px 0; }
  </style>
</head>
<body>
  <header>UNCLASSIFIED - OpsForge</header>
  
  <div class="disclaimer">
    EDUCATIONAL USE ONLY. DOCTRINE FROM PUBLIC ARMYPU BS.ARMY.MIL. VERIFY CURRENT VERSIONS. NOT OFFICIAL OR OPERATIONAL. NO DOD ENDORSEMENT IMPLIED.
  </div>

  <h1 style="text-align:center; color:#0f0;">OPERATIONS CENTER</h1>

  <!-- Echelon Selector -->
  <div style="padding:10px;">
    <label>Select Echelon: </label>
    <select id="echelon">
      <option value="Company">Company</option>
      <option value="Battalion">Battalion</option>
      <option value="Brigade">Brigade</option>
      <option value="Division">Division</option>
      <option value="Corps">Corps</option>
    </select>
  </div>

  <!-- Ask Doctrine -->
  <div style="margin:20px;">
    <h2>Ask Doctrine</h2>
    <input id="question" placeholder="Example: What is the symbol for Infantry Company?" style="width:100%; padding:10px;">
    <button onclick="askDoctrine()">Ask</button>
    <div id="answer" style="margin-top:15px; background:#222; padding:15px; border:1px solid #0f0; min-height:100px;"></div>
  </div>

  <!-- Tactical Overlay -->
  <div style="margin:20px;">
    <h2>Tactical Overlay (MGRS Grid)</h2>
    <div id="map" style="height:400px; background:#000; border:2px solid #0f0;"></div>
    <button onclick="saveOverlay()">Save & Download Overlay (PDF)</button>
  </div>

  <footer>UNCLASSIFIED - OpsForge © 2026</footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Simple map with placeholder MGRS
    let map = L.map('map').setView([35.0, -80.0], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    function askDoctrine() {
      const q = document.getElementById('question').value.toUpperCase().trim();
      const answerBox = document.getElementById('answer');
      
      if (q.includes("INFANTRY COMPANY") || q.includes("COMPANY SYMBOL")) {
        answerBox.innerHTML = `
          <strong>Exact MIL-STD-2525D Symbol for Infantry Company (FM 1-02.2):</strong><br><br>
          • Frame: Blue rectangle (friendly forces)<br>
          • Icon: "I" or crossed rifles centered in the frame<br>
          • Echelon indicator: Two horizontal bars below the frame (Company level)<br>
          • Modifiers: Left side = Company letter (A, B, C...), Right side = Battalion (e.g., 1-501)<br>
          Full symbol code example: Friendly Infantry Company with 2 echelon bars.<br><br>
          How to draw it: Draw rectangle → place "I" inside → add two bars underneath → add unit labels outside.
        `;
      } else {
        answerBox.innerHTML = "Full detailed doctrine answer will appear here (powered by local AI).";
      }
    }

    function saveOverlay() {
      alert("Overlay saved as PDF (AR 25-50 formatted). In full version this will download the file.");
      // Real download code will be added in next step
    }
  </script>
</body>
</html>
